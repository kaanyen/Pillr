# Optional CD: deploy Firestore rules/indexes and Cloud Functions to Firebase.
#
# Setup (one-time):
# 1. Create a CI token: locally run `npx -y firebase-tools@latest login:ci`
#    and add the printed token as repo secret FIREBASE_TOKEN (Settings → Secrets).
# 2. Or use Workload Identity / service account (recommended for orgs) — see
#    https://github.com/google-github-actions/auth
#
# Run: Actions → "Deploy Firebase" → Run workflow.
# To deploy on every push to main instead, add a push: branches: [main] trigger.

name: Deploy Firebase

on:
  workflow_dispatch:
    inputs:
      only:
        description: "Passed to firebase deploy --only (comma-separated)"
        required: true
        default: "firestore,functions"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Build functions
        working-directory: functions
        run: |
          npm ci
          npm run build

      - name: Deploy to Firebase
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          npx -y firebase-tools@latest deploy --only "${{ github.event.inputs.only }}" --project thepillr2 --non-interactive
