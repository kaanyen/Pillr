# Upload release APK (and optionally iOS IPA) to Firebase App Distribution.
# Secrets: FIREBASE_TOKEN (from `firebase login:ci`), FIREBASE_ANDROID_APP_ID (Firebase Console → Project settings → Your apps → App ID).
# Optional iOS: FIREBASE_IOS_APP_ID + Apple signing — omit job if not configured.

name: App Distribution

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  distribute-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.27.0'
      - run: flutter pub get
      - run: flutter build apk --release
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      - name: Distribute to testers
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_ANDROID_APP_ID: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
        run: |
          firebase appdistribution:distribute build/app/outputs/flutter-apk/app-release.apk \
            --app "$FIREBASE_ANDROID_APP_ID" \
            --token "$FIREBASE_TOKEN" \
            --groups "testers" \
            --release-notes "Build from ${GITHUB_REF_NAME:-manual run}"

  # Optional iOS: copy this job to a new workflow or uncomment when `FIREBASE_IOS_APP_ID`,
  # `FIREBASE_TOKEN`, and Apple signing are configured — see docs/RELEASE.md.
